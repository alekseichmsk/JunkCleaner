name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore JunkCleaner.sln

      - name: Test
        run: dotnet test JunkCleaner.sln -c Release --no-restore

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version 0.0.1298

      - name: Publish app
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          dotnet publish JunkCleaner/JunkCleaner.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$version `
            -o publish/JunkCleaner

      - name: Pack Velopack release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $repoUrl = "https://github.com/${{ github.repository }}"
          $releaseDir = "Releases"

          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          & vpk download github `
            --repoUrl $repoUrl `
            --token $env:GH_TOKEN `
            --outputDir $releaseDir
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Velopack release was downloaded; continuing with a full package only."
          }

          $notes = @"
          # JunkCleaner $tag

          ## Что нового

          - Новый фирменный значок приложения: `Ui/app.ico` для exe, панели задач и установщика; в приложении и README используется `Ui/Frame.svg`.
          - Обновлён README: пользовательское описание и логотип в шапке страницы на GitHub.

          ## Для разработчиков

          - В репозиторий добавлены генератор `tools/IconGen` (ICO из SVG) и макет в `ico/`.

          ## Полный релиз

          $repoUrl/releases/tag/$tag
          "@
          Set-Content -Path release-notes.md -Value $notes -Encoding UTF8

          & vpk pack `
            --packId JunkCleaner `
            --packTitle JunkCleaner `
            --packAuthors alekseichmsk `
            --packVersion $version `
            --packDir publish/JunkCleaner `
            --mainExe JunkCleaner.exe `
            --runtime win-x64 `
            --outputDir $releaseDir `
            --releaseNotes release-notes.md
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Velopack artifacts
        shell: pwsh
        run: |
          $required = @(
            "Releases/JunkCleaner-win-Setup.exe",
            "Releases/releases.win.json",
            "Releases/RELEASES"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required Velopack release file is missing: $path"
            }
          }

          $fullPackage = Get-ChildItem Releases -Filter "JunkCleaner-*-full.nupkg" | Select-Object -First 1
          if (-not $fullPackage) {
            throw "Required Velopack full package is missing."
          }

      - name: Upload GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          & vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GH_TOKEN `
            --outputDir Releases `
            --tag $tag `
            --releaseName "JunkCleaner $tag" `
            --publish `
            --merge
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
